---
# Deploy Prometheus + Grafana monitoring stack
#
# Prometheus scrape targets are generated from inventory — every host
# with node_exporter on :9100 is automatically scraped. No hardcoded IPs.
#
# Usage:
#   cd /root/projects/homelab-infra
#   ansible-playbook -i scripts/terraform_inventory.py ansible-monitoring/configure.yml

- name: Deploy monitoring stack
  hosts: monitoring_hosts
  gather_facts: true

  vars_files:
    # HA API token — used by the Prometheus scrape job for /api/prometheus.
    # Single source of truth: the same vault file used by ansible-homeassistant.
    - "{{ playbook_dir }}/../group_vars/all/homeassistant_vault.yml"

  roles:
    - role: prometheus
    - role: grafana
