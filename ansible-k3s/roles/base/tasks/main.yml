---
# /dev/kmsg is required by kubelet but not present in LXC containers
- name: Create /dev/kmsg symlink
  file:
    src: /dev/console
    dest: /dev/kmsg
    state: link
    force: yes

# Make /dev/kmsg persistent across reboots
- name: Create /etc/rc.local for /dev/kmsg persistence
  copy:
    content: |
      #!/bin/bash
      ln -sf /dev/console /dev/kmsg
      exit 0
    dest: /etc/rc.local
    mode: '0755'

# Enable root password login for Ansible access
- name: Enable PermitRootLogin
  copy:
    content: "PermitRootLogin yes\n"
    dest: /etc/ssh/sshd_config.d/99-permit-root.conf
    mode: '0644'
  notify: restart sshd

- name: Update apt package cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: safe

- name: Install required packages
  apt:
    name:
      - curl
      - wget
      - nfs-common
      - socat
      - fuse-overlayfs
      - ca-certificates
      - apt-transport-https
      - gnupg
      - lsb-release
      - open-iscsi
    state: present

- name: Set timezone to UTC
  timezone:
    name: UTC
