---
# Retrieve the join token that was set as a fact on the server node
# during Play 4. hostvars['k3s-server'] gives us access to facts from
# the k3s-server host even though we are running on a different host now.
- name: Get k3s token from server
  set_fact:
    k3s_token: "{{ hostvars['k3s-server']['k3s_token'] }}"

- name: Create /etc/rancher/k3s directory
  file:
    path: /etc/rancher/k3s
    state: directory
    mode: '0755'

# Write the agent config. Key settings:
#   server   -> URL of the k3s API server (the server node)
#   token    -> cluster join token (from the server node fact above)
#   node-name -> this node's name as it will appear in kubectl get nodes
#   snapshotter -> fuse-overlayfs (same as server, needed inside LXC)
- name: Write k3s agent config
  template:
    src: k3s-agent-config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: '0644'

- name: Check if k3s agent is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

# Install k3s in agent mode. INSTALL_K3S_EXEC="agent" tells the installer
# to create a k3s-agent systemd service rather than a k3s service.
# The agent reads its config from /etc/rancher/k3s/config.yaml (written above).
- name: Install k3s agent
  shell: >
    curl -sfL https://get.k3s.io |
    {% if k3s_version != "" %}INSTALL_K3S_VERSION="{{ k3s_version }}"{% endif %}
    INSTALL_K3S_EXEC="agent"
    sh -
  args:
    executable: /bin/bash
  when: not k3s_binary.stat.exists
  timeout: 300

- name: Wait for k3s-agent service to be active
  command: systemctl is-active k3s-agent
  register: agent_active
  until: agent_active.rc == 0
  retries: 24
  delay: 5
  changed_when: false
