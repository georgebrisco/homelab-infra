---
# ---------------------------------------------------------------------------
# Omada controller connection
# ---------------------------------------------------------------------------
omada_url: "https://192.168.50.27:8043"
omada_site_name: "Country Club"
omada_lan_name:  "Default"
omada_validate_certs: false

# ---------------------------------------------------------------------------
# LAN DNS Servers — advertised to DHCP clients
# ---------------------------------------------------------------------------
lan_primary_dns:   "192.168.50.2"
lan_secondary_dns: "1.1.1.1"

# ---------------------------------------------------------------------------
# Static Routes — managed on the ER707-M2 via Omada controller API
# ---------------------------------------------------------------------------
static_routes:
  - name: iot-subnet
    destinations:
      - "192.168.20.0/24"
    next_hop: "192.168.50.32"
    metric: 0
    status: true

# ---------------------------------------------------------------------------
# DHCP reservations are now derived dynamically from:
#   - Terraform outputs (all LXC containers)
#   - devices.yml (physical + non-managed devices)
# See configure.yml pre_tasks for the merge logic.
# ---------------------------------------------------------------------------
