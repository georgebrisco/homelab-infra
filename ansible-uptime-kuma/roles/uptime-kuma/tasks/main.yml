---
# Deploy Uptime Kuma monitoring dashboard

- name: Install Node.js prerequisites
  apt:
    name:
      - curl
      - ca-certificates
    state: present
    update_cache: true

- name: Check if Node.js is installed
  command: node --version
  register: node_check
  changed_when: false
  failed_when: false

- name: Add NodeSource LTS repository
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
  when: node_check.rc != 0

- name: Install Node.js (includes npm)
  apt:
    name: nodejs
    state: present
  when: node_check.rc != 0

- name: Create uptime-kuma system user
  user:
    name: "{{ uptime_kuma_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ uptime_kuma_install_dir }}"
    create_home: false

- name: Clone Uptime Kuma repo
  git:
    repo: "{{ uptime_kuma_repo }}"
    dest: "{{ uptime_kuma_install_dir }}"
    version: "{{ uptime_kuma_version }}"
    force: false
  register: git_clone
  become: true
  become_user: "{{ uptime_kuma_user }}"

- name: Install production dependencies
  community.general.npm:
    path: "{{ uptime_kuma_install_dir }}"
    production: true
    ci: true
  become: true
  become_user: "{{ uptime_kuma_user }}"
  when: git_clone.changed

- name: Run Uptime Kuma setup
  command:
    cmd: node server/setup-database.js
    chdir: "{{ uptime_kuma_install_dir }}"
  become: true
  become_user: "{{ uptime_kuma_user }}"
  environment:
    DATA_DIR: "{{ uptime_kuma_data_dir }}"
  when: git_clone.changed

- name: Ensure data directory ownership
  file:
    path: "{{ uptime_kuma_data_dir }}"
    owner: "{{ uptime_kuma_user }}"
    group: "{{ uptime_kuma_user }}"
    state: directory
    recurse: true

- name: Deploy systemd service
  template:
    src: uptime-kuma.service.j2
    dest: /etc/systemd/system/uptime-kuma.service
    mode: "0644"
  notify: restart uptime-kuma

- name: Enable and start Uptime Kuma
  systemd:
    name: uptime-kuma
    enabled: true
    state: started
    daemon_reload: true
