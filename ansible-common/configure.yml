---
# Deploy common baseline services to all managed hosts
#
# Roles:
#   - admin-user:    Create admin user with SSH key + passwordless sudo
#   - node-exporter: Prometheus metrics on :9100
#
# Usage:
#   cd /root/projects/homelab-infra
#   ansible-playbook -i scripts/terraform_inventory.py ansible-common/configure.yml

- name: Deploy baseline services to all containers
  hosts: containers
  gather_facts: true

  roles:
    - role: base-packages
    - role: admin-user
    - role: node-exporter

- name: Deploy baseline services to physical devices
  hosts: physical_devices
  gather_facts: true
  become: true

  roles:
    - role: admin-user
    - role: node-exporter
    - role: base-packages
