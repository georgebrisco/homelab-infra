---
# Install Prometheus node_exporter
# Provides host-level metrics (CPU, memory, disk, network) on :9100

- name: Check if node_exporter is installed
  stat:
    path: /usr/local/bin/node_exporter
  register: ne_binary

- name: Get installed version
  command: /usr/local/bin/node_exporter --version
  register: ne_installed
  changed_when: false
  when: ne_binary.stat.exists
  failed_when: false

- name: Set node_exporter version
  set_fact:
    node_exporter_version: "{{ node_exporter_version | default('1.8.2') }}"

- name: Determine architecture
  set_fact:
    ne_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

- name: Download node_exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ ne_arch }}.tar.gz"
    dest: /tmp/node_exporter.tar.gz
  when: not ne_binary.stat.exists

- name: Extract node_exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: true
  when: not ne_binary.stat.exists

- name: Install node_exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ ne_arch }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    remote_src: true
  when: not ne_binary.stat.exists
  notify: restart node_exporter

- name: Create node_exporter system user
  user:
    name: node_exporter
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create node_exporter systemd service
  copy:
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      User=node_exporter
      ExecStart=/usr/local/bin/node_exporter
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify: restart node_exporter

- name: Enable and start node_exporter
  systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true

- name: Clean up download
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/node_exporter.tar.gz
    - "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ ne_arch }}"
  when: not ne_binary.stat.exists
