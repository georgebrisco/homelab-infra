---
# Create an 'admin' user with SSH key auth and passwordless sudo.
#
# Works on:
#   - Debian/Ubuntu LXC containers (all 17)
#   - Proxmox host (Debian)
#   - TrueNAS SCALE (Debian — apt blocked, sudoers has no @includedir)
#   - Gardener Pi (Debian)
#
# Skipped on:
#   - Home Assistant OS (Alpine appliance — ephemeral root filesystem,
#     user changes don't persist across supervisor restarts. Use the
#     built-in 'hassio' user instead.)

# --- Skip HA OS (ephemeral filesystem, changes don't persist) ---
- name: Detect Home Assistant OS
  set_fact:
    is_haos: "{{ (ansible_os_family == 'Alpine' or (ansible_distribution | default('')) == 'Alpine') }}"

- name: Skip Home Assistant OS
  debug:
    msg: "Skipping admin-user on {{ inventory_hostname }} — HA OS has an ephemeral filesystem. Use the built-in 'hassio' user."
  when: is_haos

- name: End role for HA OS hosts
  meta: end_host
  when: is_haos

# --- Detect TrueNAS (no @includedir in sudoers) ---
- name: Check for @includedir in sudoers
  command: grep -c '@includedir\|#includedir' /etc/sudoers
  register: sudoers_includedir
  changed_when: false
  failed_when: false
  become: true

# --- Create user ---
- name: Create admin user
  user:
    name: "{{ admin_username }}"
    shell: "{{ admin_shell }}"
    create_home: true
    state: present
  become: true

# --- SSH key ---
- name: Deploy manager SSH key for admin user
  authorized_key:
    user: "{{ admin_username }}"
    key: "{{ admin_ssh_pubkey }}"
    state: present
    exclusive: false
  become: true

# --- Sudo ---
- name: Check if sudo is installed
  command: which sudo
  register: sudo_check
  changed_when: false
  failed_when: false

- name: Install sudo package (skip if apt is broken or blocked)
  apt:
    name: sudo
    state: present
  become: true
  when: ansible_pkg_mgr == 'apt' and sudo_check.rc != 0
  register: sudo_install
  failed_when: false

- name: Warn if sudo could not be installed
  debug:
    msg: "WARNING: sudo not available and could not be installed on {{ inventory_hostname }}. Admin user will not have sudo."
  when: sudo_check.rc != 0 and (sudo_install is defined and sudo_install.rc is defined and sudo_install.rc != 0)

# Hosts with @includedir: use drop-in file (standard Debian/Ubuntu)
- name: Create sudoers drop-in for admin
  copy:
    content: "{{ admin_username }} ALL=(ALL:ALL) NOPASSWD: ALL\n"
    dest: "{{ admin_sudoers_file }}"
    mode: "0440"
    validate: "visudo -cf %s"
  become: true
  when: sudo_check.rc == 0 and sudoers_includedir.stdout | default('0') | int > 0

# Hosts without @includedir (e.g. TrueNAS): add directly to /etc/sudoers
- name: Add admin to /etc/sudoers directly (no includedir)
  lineinfile:
    path: /etc/sudoers
    regexp: '^{{ admin_username }}\s'
    line: "{{ admin_username }} ALL=(ALL:ALL) NOPASSWD: ALL"
    validate: "visudo -cf %s"
  become: true
  when: sudo_check.rc == 0 and sudoers_includedir.stdout | default('0') | int == 0
