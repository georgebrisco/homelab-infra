---
- name: restart mediamtx
  systemd:
    name: mediamtx
    state: restarted
    daemon_reload: true

- name: restart hemera-detect
  systemd:
    name: hemera-detect
    state: restarted
    daemon_reload: true

- name: restart node-exporter
  systemd:
    name: node-exporter
    state: restarted
    daemon_reload: true
