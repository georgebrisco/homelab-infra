---
# Deploy Home Assistant configuration, add-ons, and backups
#
# Manages:
#   - configuration.yaml, automations.yaml, sensor configs (via Jinja templates)
#   - secrets.yaml (from Ansible Vault)
#   - Add-on installation, configuration, and boot mode (via Supervisor API)
#   - Backup sync to TrueNAS + restore/trigger scripts
#
# Does NOT manage:
#   - HA installation or updates (HAOS manages itself)
#   - Integrations added through the UI (config entries)
#   - HACS custom component installation (HACS manages itself)
#   - scenes.yaml / scripts.yaml (UI-managed, only created if missing)
#
# Prerequisites:
#   - SSH access to HA host (hassio@192.168.50.5)
#   - HA long-lived access token in Ansible Vault (for config reload)
#   - TrueNAS SSH access (for backup sync)
#
# Usage:
#   cd /root/projects/homelab-infra
#   make homeassistant
#
# First run on a fresh HA Yellow (restore from backup first):
#   1. Flash HAOS, install SSH add-on manually, add your SSH key
#   2. ssh hassio@<ip> ha-backup-restore.sh   (pulls latest from TrueNAS)
#   3. After restore completes and HA restarts:
#      make homeassistant    (applies YAML config + ensures add-ons match)
#
# Skip add-on management (config-only run):
#   ansible-playbook ... -e ha_manage_addons=false

- name: Deploy Home Assistant configuration
  hosts: homeautomation_hosts
  gather_facts: false
  become: true

  vars_files:
    - "{{ playbook_dir }}/../group_vars/all/mqtt.yml"
    - "{{ playbook_dir }}/../group_vars/all/homeassistant.yml"
    - "{{ playbook_dir }}/../group_vars/all/homeassistant_vault.yml"

  roles:
    - role: ha-config
    - role: ha-addons
      when: ha_manage_addons | default(true) | bool
    - role: ha-backup
