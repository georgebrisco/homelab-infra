---
# Deploy Home Assistant YAML configuration
#
# Manages:
#   - configuration.yaml, automations.yaml, sensor configs (via Jinja templates)
#   - secrets.yaml (from Ansible Vault)
#   - Backup sync to TrueNAS
#
# Does NOT manage:
#   - HA installation or updates (HAOS manages itself)
#   - Add-on installation/config (UI-managed; consider HA CLI automation later)
#   - Integrations added through the UI
#   - scenes.yaml / scripts.yaml (UI-managed, only created if missing)
#
# Prerequisites:
#   - SSH access to HA host (hassio@192.168.50.11)
#   - HA long-lived access token in Ansible Vault (for config reload)
#   - TrueNAS SSH access (for backup sync)
#
# Usage:
#   cd /root/projects/homelab-infra
#   ansible-playbook -i scripts/terraform_inventory.py ansible-homeassistant/configure.yml
#
# First run (no API token yet):
#   ansible-playbook -i scripts/terraform_inventory.py ansible-homeassistant/configure.yml -e ha_reload_method=none
#   Then manually reload HA, create a long-lived token, and add it to Vault.

- name: Deploy Home Assistant configuration
  hosts: homeautomation_hosts
  gather_facts: false
  become: true

  vars_files:
    - "{{ playbook_dir }}/../group_vars/all/mqtt.yml"
    - "{{ playbook_dir }}/../group_vars/all/homeassistant.yml"

  roles:
    - role: ha-config
    - role: ha-backup
