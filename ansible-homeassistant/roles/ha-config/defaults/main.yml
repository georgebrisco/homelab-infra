---
# ha-config defaults — the single source of truth for HA configuration
#
# Override in group_vars/all/homeassistant.yml or host_vars/homeassistant.yml.
# This file documents the full data model; production values live in group_vars.

ha_config_dir: /config

# --- Persons tracked for presence detection ---
ha_persons:
  - entity_id: person.george_brisco
    name: George
  - entity_id: person.roseanna_glynn
    name: Roseanna

# --- Climate / HVAC ---
ha_thermostat_entity: climate.t9_thermostat

# Schedule temperatures (°C)
ha_hvac_sleep_temp: 20           # Night-time cooling target
ha_hvac_day_temp: 23.5           # Daytime comfort when home
ha_hvac_away_near_temp: 26       # Away but nearby (< ha_hvac_away_distance_km)
ha_hvac_away_far_temp: 28        # Away and far (≥ ha_hvac_away_distance_km)
ha_hvac_resume_temp: 25          # Auto-resume cooling if indoor temp exceeds this
                                 # during the morning drift window (AC-off → day-start)

# Schedule times
ha_hvac_sleep_start: "21:00:00"  # 9 PM — begin night cooling
ha_hvac_morning_off: "05:00:00"  # 5 AM — AC off, let temp drift up naturally
ha_hvac_day_start: "07:00:00"    # 7 AM — day schedule begins

# Presence / distance
ha_hvac_away_distance_km: 10     # Near vs far boundary (km from home)

# Seasonal mode switching (based on outdoor temperature)
#   outdoor > cool_threshold  →  cool mode
#   outdoor < heat_threshold  →  heat mode
#   between the two           →  heat_cool (let thermostat decide)
ha_hvac_outdoor_cool_threshold: 18
ha_hvac_outdoor_heat_threshold: 15
ha_hvac_heat_day_temp: 22        # Heating setpoint during the day (rare in Miami)
# No heating at night — AC is simply off and temp drifts naturally.

# Legacy aliases (kept for backward compat during transition)
ha_hvac_comfort_temp: "{{ ha_hvac_day_temp }}"
ha_hvac_away_temp: "{{ ha_hvac_away_far_temp }}"
ha_hvac_night_temp: "{{ ha_hvac_sleep_temp }}"
ha_hvac_night_start_hour: 21
ha_hvac_night_end_hour: 7
ha_hvac_off_time: "{{ ha_hvac_morning_off }}"

# --- Blinds ---
ha_blinds:
  - entity_id: cover.blind
    name: Living Room Blind
  - entity_id: cover.bed_blind
    name: Bedroom Blind
    presence_sensor: binary_sensor.presencesensor_occupancy
    auto_close_delay_minutes: 30

# --- Light groups (defined in configuration.yaml) ---
ha_light_groups:
  - name: Roseanna_Bathroom_Lights
    unique_id: lightgroup.roseanna_bathroom
    entities:
      - light.roseanna_bath_1
      - light.roseanna_bath_2
      - light.roseanna_bath_3
      - light.roseanna_bath_4
      - light.roseanna_bath_5
      - light.roseanna_bath_6

# --- Grow lamp ---
ha_grow_lamp:
  switch_device_id: 5def00640fac19a0603fd9ce849cc920
  switch_entity_id: 75ecf9fc8b20f982f748b233108a0c20
  sunrise_offset: "03:30:00"

# --- Temperature sensors for derivative tracking ---
ha_temperature_sensors:
  - source: sensor.bedroom_temphumid_temperature
    name: Bedroom Temperature Rate
  - source: sensor.livingroom_temphumid_temperature
    name: Living Room Temperature Rate
  - source: sensor.sparebedroom_temphumid_temperature
    name: Spare Bedroom Temperature Rate

# --- Template sensors ---
ha_ac_supply_sensors:
  - sensor.sparebedroomduct_temphumid_temperature
  - sensor.bedroomduct_temphumid_temperature
ha_ac_return_sensor: sensor.aircon_temphumid_temperature

ha_outdoor_temp_sensors:
  - sensor.balcony_temphumid_temperature
  - sensor.balcony_temphumid2_temperature

# --- NOAA tides ---
ha_noaa_tide_station_id: "8723026"       # Golden Beach, FL (nearest to Aventura)
ha_noaa_tide_prediction_scan_interval: 1800

# --- Network monitoring ---
# command_line sensors for ping RTT (ms).  The legacy "sensor: platform: ping"
# format is removed in HA 2024+; config-flow ping gives only a binary_sensor.
# command_line gives us numeric round-trip-time sensors we can graph.
#
# Wired pings go over end0 (192.168.50.5); WiFi pings go over wlan0 (192.168.50.11).
# Both groups hit the same targets so you can compare the two paths side by side.

ha_wired_source_ip: "192.168.50.5"
ha_wifi_source_ip: "192.168.50.11"

ha_ping_targets:
  - name: Google
    host: 8.8.8.8
    slug: google
  - name: Cloudflare
    host: 1.1.1.1
    slug: cloudflare
  - name: BBC UK
    host: 212.58.244.22             # bbc.co.uk — stable UK endpoint
    slug: bbc_uk
  - name: AT&T Router
    host: 192.168.50.1              # AT&T gateway — our route to the internet
    slug: att_router

# Generated from ha_ping_targets × {wired, wifi}.
# Also includes a legacy entity_id mapping for AT&T (HA slugified "Ping AT&T Router"
# differently from the unique_id we set).
ha_ping_monitors:
  # ── Wired (end0) ──
  - name: Ping Google Wired
    host: 8.8.8.8
    slug: ping_google_wired
    source_ip: "192.168.50.5"
    group: wired
  - name: Ping Cloudflare Wired
    host: 1.1.1.1
    slug: ping_cloudflare_wired
    source_ip: "192.168.50.5"
    group: wired
  - name: Ping BBC UK Wired
    host: 212.58.244.22
    slug: ping_bbc_uk_wired
    source_ip: "192.168.50.5"
    group: wired
  - name: Ping AT&T Router Wired
    host: 192.168.50.1
    slug: ping_att_router_wired
    entity_id: ping_at_t_router_wired    # HA slugifies "AT&T" → "at_t"
    source_ip: "192.168.50.5"
    group: wired
  # ── WiFi (wlan0) ──
  - name: Ping Google WiFi
    host: 8.8.8.8
    slug: ping_google_wifi
    source_ip: "192.168.50.11"
    group: wifi
  - name: Ping Cloudflare WiFi
    host: 1.1.1.1
    slug: ping_cloudflare_wifi
    source_ip: "192.168.50.11"
    group: wifi
  - name: Ping BBC UK WiFi
    host: 212.58.244.22
    slug: ping_bbc_uk_wifi
    source_ip: "192.168.50.11"
    group: wifi
  - name: Ping AT&T Router WiFi
    host: 192.168.50.1
    slug: ping_att_router_wifi
    entity_id: ping_at_t_router_wifi     # HA slugifies "AT&T" → "at_t"
    source_ip: "192.168.50.11"
    group: wifi

# Scan interval for command_line ping sensors (seconds)
ha_ping_scan_interval: 60
ha_ping_count: 3

# --- DNS resolution time ---
# Measures how long it takes to resolve a name via the configured DNS server.
# Uses dig against AdGuard (primary DNS).
ha_dns_server: "192.168.50.2"
ha_dns_test_host: "google.com"

# --- Jitter ---
# Computed from ping -c 10 mdev (mean deviation) — a good proxy for jitter.
ha_jitter_host: 8.8.8.8
ha_jitter_count: 10

# --- WH51 soil moisture sensors (via rtl_433 → MQTT) ---
# Device IDs + plant names — templates generate MQTT sensor config + dashboard.
ha_wh51_mqtt_topic_prefix: "rtl_proxy/gardener/events"
# WH51 battery voltage range for percentage calculation
# 1700 mV = fresh cell, 1200 mV = effectively dead
ha_wh51_battery_max_mv: 1700
ha_wh51_battery_min_mv: 1200
ha_wh51_sensors:
  - id: "0dc5f0"
    name: Pineapple
  - id: "0dc7b9"
    name: Left Large Palm
  - id: "0dc862"
    name: Hibiscus
  - id: "0dca9c"
    name: Single Cactus
  - id: "0dd020"
    name: Mixed Cactus
  - id: "0e184b"
    name: Large Mixed Tradescantia
    # Auto-discovered by MQTT — entity IDs don't match Ansible naming
    moisture_entity: sensor.soil_moisture_wh51_0e184b_mqtt_sensor
    battery_entity: sensor.soil_moisture_wh51_0e184b_mqtt_sensor_3
  - id: "0e1a4f"
    name: New Monstera
  - id: "0e1dd1"
    name: Banana
  - id: "0e27b3"
    name: Stripy Pot Monstera
  - id: "0e2851"
    name: Desert Rose
  - id: "0e28a2"
    name: Citronella
  - id: "0e29ec"
    name: Aglaonema
  - id: "0ee085"
    name: Coffee Plant
    # Auto-discovered by MQTT — entity IDs don't match Ansible naming
    moisture_entity: sensor.soil_moisture_wh51_0ee085_wh51_0ee085_moisture
    battery_entity: sensor.soil_moisture_wh51_0ee085_wh51_0ee085_battery_ok
  - id: "0effd0"
    name: Unknown Plant

# --- HA restart method after config push ---
# Options: "api" (call check-config then reload via REST API) or "none" (manual)
ha_reload_method: api
ha_api_url: "http://192.168.50.5:8123"
# ha_api_token should be set in group_vars via Ansible Vault — see README
# ha_api_token: ""
