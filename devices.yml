    ip: "192.168.50.12"
    ansible_user: root
    roles: [proxmox_host]

  - name: homeassistant
    mac: "d8:3a:dd:cd:a8:b6"
    ip: "192.168.50.11"
    ansible_user: hassio
    roles: [iot, homeautomation]

  - name: truenas
    mac: "bc:24:11:00:35:85"
