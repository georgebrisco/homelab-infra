---
# Forgejo version — check https://codeberg.org/forgejo/forgejo/releases
forgejo_version: "10.0.3"
forgejo_arch: "amd64"

# System user that runs Forgejo (owns repos and config)
forgejo_user: git
forgejo_group: git
forgejo_home: /home/git

# Paths
forgejo_install_dir: /usr/local/bin
forgejo_work_path: /var/lib/forgejo
forgejo_config_dir: /etc/forgejo
forgejo_log_dir: /var/log/forgejo
forgejo_repos_dir: "{{ forgejo_home }}/forgejo-repositories"

# Network
forgejo_http_port: 3000
forgejo_domain: "git.brisco.org.uk"
forgejo_root_url: "https://{{ forgejo_domain }}"
forgejo_ssh_port: 22
forgejo_ssh_listen_port: 22

# Database — SQLite is fine for a single-user homelab
forgejo_db_type: sqlite3
forgejo_db_path: "{{ forgejo_work_path }}/forgejo.db"

# App
forgejo_app_name: "George's Homelab Git"

# Security — set true to skip the install wizard (repo already seeded via ansible)
forgejo_install_lock: true

# Registration — disable public registration; admin creates accounts
forgejo_disable_registration: true
forgejo_require_signin: true
