---
# moisture_proxy — MQTT bridge for Ecowitt WH51 → Home Assistant auto-discovery

- name: Install Python dependencies
  apt:
    name:
      - python3
      - python3-pip
    state: present
    update_cache: true

- name: Install paho-mqtt
  pip:
    name: paho-mqtt
    state: present
    break_system_packages: true

- name: Create moisture_proxy system user
  user:
    name: "{{ moisture_proxy_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create application directory
  file:
    path: "{{ moisture_proxy_dir }}"
    state: directory
    owner: "{{ moisture_proxy_user }}"
    group: "{{ moisture_proxy_user }}"
    mode: "0755"

- name: Deploy moisture_proxy.py
  template:
    src: moisture_proxy.py.j2
    dest: "{{ moisture_proxy_dir }}/moisture_proxy.py"
    owner: "{{ moisture_proxy_user }}"
    group: "{{ moisture_proxy_user }}"
    mode: "0644"
  notify: restart moisture_proxy

- name: Deploy systemd service
  template:
    src: moisture_proxy.service.j2
    dest: /etc/systemd/system/moisture_proxy.service
    mode: "0644"
  notify:
    - reload systemd
    - restart moisture_proxy

- name: Enable and start moisture_proxy
  systemd:
    name: moisture_proxy
    enabled: true
    state: started
    daemon_reload: true
