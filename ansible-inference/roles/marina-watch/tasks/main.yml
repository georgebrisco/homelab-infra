---
# Marina Watch — YOLOv8 object detection dashboard
# Runs on the inference VM, pulling frames from panoptes RTSP stream.

- name: Install system dependencies
  ansible.builtin.apt:
    name: "{{ marina_watch_packages }}"
    state: present
    update_cache: true
  tags: [setup]

- name: Install Python packages
  ansible.builtin.pip:
    name: "{{ marina_watch_pip_packages }}"
    state: present
    break_system_packages: true
  tags: [setup]

- name: Deploy Marina Watch application
  ansible.builtin.copy:
    src: marina_watch.py
    dest: /opt/marina_watch.py
    mode: "0755"
  notify: restart marina-watch

- name: Deploy systemd service
  ansible.builtin.template:
    src: marina-watch.service.j2
    dest: /etc/systemd/system/marina-watch.service
    mode: "0644"
  notify:
    - reload systemd
    - restart marina-watch

- name: Enable and start Marina Watch
  ansible.builtin.systemd:
    name: marina-watch
    enabled: true
    state: started
    daemon_reload: true
