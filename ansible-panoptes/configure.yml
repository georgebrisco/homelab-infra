---
# Deploy panoptes services
#
# Usage:
#   cd /root/projects/homelab-infra
#   ansible-playbook -i scripts/terraform_inventory.py ansible-panoptes/configure.yml
#
#   # Skip first-time setup (redeploy config only):
#   ansible-playbook -i scripts/terraform_inventory.py ansible-panoptes/configure.yml --skip-tags setup

- name: Deploy RTSP camera streaming on panoptes
  hosts: panoptes
  gather_facts: true
  become: true

  roles:
    - role: rtsp-camera
