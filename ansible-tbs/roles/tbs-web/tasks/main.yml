---
# Deploy Tea Blend Studio — Vite/React frontend via Nginx + Express API via PM2
#
# Architecture:
#   Nginx (port 80) → serves dist/ for frontend, proxies /api/ → Express (port 3001)
#   PM2 manages the Express API server (server/index.js)
#   Cloudflare tunnel terminates HTTPS and forwards to Nginx on port 80

# --- System setup (first-time only) ---
- name: Install system prerequisites
  apt:
    name:
      - curl
      - ca-certificates
      - git
      - build-essential
      - nginx
    state: present
    update_cache: true
  tags: [setup]

- name: Check if Node.js is installed
  command: node --version
  register: node_check
  changed_when: false
  failed_when: false
  tags: [setup]

- name: Add NodeSource LTS repository
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
  when: node_check.rc != 0
  tags: [setup]

- name: Install Node.js
  apt:
    name: nodejs
    state: present
  when: node_check.rc != 0
  tags: [setup]

- name: Install PM2 globally
  npm:
    name: pm2
    global: true
    state: present
  tags: [setup]

- name: Generate SSH keypair for git access
  openssh_keypair:
    path: /root/.ssh/id_ed25519
    type: ed25519
    comment: "{{ inventory_hostname }}"
    force: false
  tags: [setup]

- name: Register container SSH key on devbox git server
  delegate_to: localhost
  shell: |
    pubkey=$(ssh -o StrictHostKeyChecking=no root@{{ ansible_host }} 'cat /root/.ssh/id_ed25519.pub')
    ssh -o StrictHostKeyChecking=no root@192.168.50.23 \
      "grep -qxF '$pubkey' /root/.ssh/authorized_keys || echo '$pubkey' >> /root/.ssh/authorized_keys"
  tags: [setup]

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx
  tags: [setup]

# --- Deploy (runs every time) ---
- name: Clone or update the git repo
  git:
    repo: "{{ tbs_git_repo }}"
    dest: "{{ tbs_app_dir }}"
    force: true
    accept_hostkey: true
    version: "{{ tbs_git_version }}"

- name: Install npm dependencies
  community.general.npm:
    path: "{{ tbs_app_dir }}"
    state: present

- name: Build the Vite app
  command: npm run build
  args:
    chdir: "{{ tbs_app_dir }}"
  register: build_result
  changed_when: true

- name: Generate version.json with git commit info
  shell: |
    cat > {{ tbs_app_dir }}/dist/version.json <<EOF
    {
      "commit": "$(git -C {{ tbs_app_dir }} rev-parse --short HEAD)",
      "commit_full": "$(git -C {{ tbs_app_dir }} rev-parse HEAD)",
      "branch": "{{ tbs_git_version }}",
      "built": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    }
    EOF

- name: Deploy .env file for Express API
  template:
    src: env.j2
    dest: "{{ tbs_app_dir }}/.env"
    mode: "0600"
  notify: restart api

- name: Deploy Nginx site config
  template:
    src: nginx-tbs.conf.j2
    dest: /etc/nginx/sites-available/tea-blend-studio
    mode: "0644"
  notify: reload nginx

- name: Enable Nginx site
  file:
    src: /etc/nginx/sites-available/tea-blend-studio
    dest: /etc/nginx/sites-enabled/tea-blend-studio
    state: link
  notify: reload nginx

- name: Ensure Nginx is running
  systemd:
    name: nginx
    enabled: true
    state: started

- name: Stop old serve-based PM2 process if present
  shell: |
    pm2 describe website > /dev/null 2>&1 && pm2 delete website || true
  changed_when: false

- name: Start or restart Express API with PM2
  shell: |
    pm2 describe {{ tbs_app_name }}-api > /dev/null 2>&1 \
      && pm2 restart {{ tbs_app_name }}-api \
      || pm2 start server/index.js --name "{{ tbs_app_name }}-api"
  args:
    chdir: "{{ tbs_app_dir }}"

- name: Save PM2 process list
  command: pm2 save

- name: Configure PM2 to start on boot
  shell: pm2 startup systemd -u root --hp /root
  args:
    creates: /etc/systemd/system/pm2-root.service
  ignore_errors: true
