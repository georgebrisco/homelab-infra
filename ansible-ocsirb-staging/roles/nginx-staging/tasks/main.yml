---
# ocsirb-staging — Nginx serving staging React app
# Cloudflared is deployed separately via ansible-tunnel.

- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: true

- name: Ensure web root exists
  file:
    path: /var/www/html
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Deploy staging site config
  template:
    src: ocsirb-staging.conf.j2
    dest: /etc/nginx/sites-available/ocsirb-staging
    mode: "0644"
  notify: reload nginx

- name: Enable staging site
  file:
    src: /etc/nginx/sites-available/ocsirb-staging
    dest: /etc/nginx/sites-enabled/ocsirb-staging
    state: link
  notify: reload nginx

- name: Remove default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Enable and start nginx
  systemd:
    name: nginx
    enabled: true
    state: started
