---
# florida-ai — Nginx serving React static build + Node.js chat API
# Cloudflared is deployed separately via ansible-tunnel.

- name: Install nginx and nodejs
  apt:
    name:
      - nginx
      - nodejs
    state: present
    update_cache: true

- name: Ensure web root exists
  file:
    path: /var/www/florida-ai
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Deploy security headers snippet
  template:
    src: security-headers.conf.j2
    dest: /etc/nginx/snippets/security-headers.conf
    mode: "0644"
  notify: reload nginx

- name: Deploy florida-ai site config
  template:
    src: florida-ai.conf.j2
    dest: /etc/nginx/sites-available/florida-ai
    mode: "0644"
  notify: reload nginx

- name: Enable florida-ai site
  file:
    src: /etc/nginx/sites-available/florida-ai
    dest: /etc/nginx/sites-enabled/florida-ai
    state: link
  notify: reload nginx

- name: Remove default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Enable and start nginx
  systemd:
    name: nginx
    enabled: true
    state: started

# --- Chat API ---

- name: Ensure chat API directory exists
  file:
    path: /opt/florida-ai-api
    state: directory
    mode: "0755"

- name: Deploy chat API source files
  copy:
    src: "{{ item }}"
    dest: /opt/florida-ai-api/
    mode: "0644"
  loop:
    - ../../../florida-ai-site/api/server.js
    - ../../../florida-ai-site/api/package.json
  notify: restart florida-ai-chat

- name: Install chat API npm dependencies
  community.general.npm:
    path: /opt/florida-ai-api
    state: present
  notify: restart florida-ai-chat

- name: Deploy chat API environment file
  template:
    src: florida-ai-api.env.j2
    dest: /etc/florida-ai-api.env
    mode: "0600"
  notify: restart florida-ai-chat

- name: Deploy chat API systemd service
  template:
    src: florida-ai-chat.service.j2
    dest: /etc/systemd/system/florida-ai-chat.service
    mode: "0644"
  notify:
    - reload systemd
    - restart florida-ai-chat

- name: Enable and start chat API service
  systemd:
    name: florida-ai-chat
    enabled: true
    state: started
    daemon_reload: true
